# Keybind to reload this configs
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux config!"

# Turn on mouse to scroll to terminal and clickable status line
set -g mouse on


###
# Styling
###

# Colors
BG="#282C34",
LBG="#3F4451",
FG="#cdd6f4",
LFG="#abb2bf",
YELLOW="#e5c07b",
CYAN="#56b6c2",
GREEN="#98c379",
MAGENTA="#c678dd",
VIOLET="#cba6f7",
BLUE="#61afef",
RED="#e06c75",


# Move status line to top/bottom
set-option -g status-position bottom

# Set colors for statusline
set-option -g status-style bg=${BG},fg=${FG}

# Set justification
set-option -g status-justify left

# Set contents of statusline
set-option -g status-left " #{session_name} "
set-option -g status-right "#{host} "

###
# Vim
###

# Allow use of vim keybinds when using copy mode
set-window-option -g mode-keys vi

# Keybinds for copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Use 24 bit colors (make sure terminal supports it)
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows, and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Open panes and windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Auto restore when first client attaches
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
# set -g status-right 'Continuum status: #{continuum_status}'
# set -g @continuum-save-interval '15'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
